<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <div class="main">
        <div class="calc-header">
          <img class="logo" src="image/calculator-logo.png" alt="" />
          <div class="sun-power"></div>
        </div>
        <form>
          <input type="text" id="fname" name="fname" />
        </form>
        <div class="grid-container">
          <button>%</button>
          <button>CE</button>
          <button>C</button>
          <button>X</button>
          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button>/</button>
          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>-</button>
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button>+</button>
          <button>+/-</button>
          <button>0</button>
          <button>.</button>
          <button>=</button>
        </div>
      </div>
    </section>
  </body>
</html>
