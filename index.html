<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <div class="main">
        <div class="calc-header">
          <img class="logo" src="image/calculator-logo.png" alt="" />
          <div class="sun-power"></div>
        </div>
        <form>
          <input type="text" name="fname" id="display" placeholder="0" />
        </form>
        <div class="grid-container">
          <button onclick="clearDisplay('C')">C</button>
          <button onclick="clearDisplay('AC')">AC</button>
          <button onclick="appendValue('%')">%</button>
          <button onclick="appendValue('*')">X</button>
          <button onclick="appendValue('7')">7</button>
          <button onclick="appendValue('8')">8</button>
          <button onclick="appendValue('9')">9</button>
          <button onclick="appendValue('/')">/</button>
          <button onclick="appendValue('4')">4</button>
          <button onclick="appendValue('5')">5</button>
          <button onclick="appendValue('6')">6</button>
          <button onclick="appendValue('-')">-</button>
          <button onclick="appendValue('1')">1</button>
          <button onclick="appendValue('2')">2</button>
          <button onclick="appendValue('3')">3</button>
          <button onclick="appendValue('+')">+</button>
          <button onclick="appendValue('+/-')">+/-</button>
          <button onclick="appendValue('0')">0</button>
          <button onclick="appendValue('.')">.</button>
          <button onclick="calculate()">=</button>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
